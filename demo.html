<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Java Script</h1>
    <script>
       //var declaration
        // no space b/w words, no numeric value, no reserve words
        var myName="Anjali";
        document.write(myName);
        console.log(myName);
        // JS execution (global and local(block) scope)
        function hello(){ 
            var myNme=4874736; //local or block level
            console.log(myNme);
        }
        hello();




        // from ES6...let and const
        let msg="welcome";
        console.log(msg);

        const msg2="Thanks";
        console.log(msg2);
    </script>
    
</body>
</html>
