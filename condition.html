        //switch case
        let grade='A';
        switch(grade){
            case'A': result="First division";
            break;
            case 'B': result="Second division";
            break;
            case 'C' : result="Third division";
            break;
            default: result="Fail";
        }
        console.log(result);

        // if elseif
        let marks=30;
        if(marks>=60){
            console.log("First Division Marks");
        }
        else if(marks<=60 && marks>40){
            console.log("second division marks");
        }
        else if(marks<40 && marks>=33){

        }
        else{
            console.log("Fail");
        }
